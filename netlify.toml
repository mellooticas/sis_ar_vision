[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_USE_NETLIFY_EDGE = "true"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_SIS_GATEWAY_URL,NEXT_PUBLIC_CLEARIX_VENDAS_URL,SSO_EXCHANGE_SHARED_SECRET,SSO_TICKET_SECRET"
